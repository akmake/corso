version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  neo4j:
    image: neo4j:5.19.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/admin123456
    volumes:
      - neo4j_data:/data
    restart: always

volumes:
  neo4j_data: